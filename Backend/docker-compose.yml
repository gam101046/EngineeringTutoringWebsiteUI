services:
  postgres:
    image: postgres:17
    container_name: tutoring-postgresdb

    environment:
      POSTGRES_DB: tutoringdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - tutoring_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: user@example.com
      PGADMIN_DEFAULT_PASSWORD: mypassword
    ports:
      - "8081:80"

volumes:
  tutoring_postgres_data: